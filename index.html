<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Immersive Experience Design Taxonomy</title>
  <meta name="description" content="A welcome page for the Immersive Experience Design Taxonomy. Start designing an immersive experience or learn more about the taxonomy." />
  <link rel="stylesheet" href="styles.css?v=20260720" />
</head>
<body>

  <!-- ============================================================
       SITE HEADER — brand (left), centered nav, account (right)
       ============================================================ -->
  <header class="site-header">
    <div class="header-inner">
      <a class="brand brand-link" href="index.html">
        <span class="brand-mark" aria-hidden="true">IXD</span>
        <span class="brand-name">Immersive Taxonomy</span>
      </a>

      <nav class="site-nav" aria-label="Primary">
        <a href="index.html" class="is-active" aria-current="page">Home</a>
        <a href="design.html">Design</a>
        <a href="about.html">About</a>
      </nav>

      <div class="header-actions">
        <div id="account-area" class="account-area" hidden>
          <div id="auth-buttons">
            <button id="signin-btn" class="account-btn" type="button">Sign In</button>
            <button id="signup-btn" class="account-btn account-btn-solid" type="button">Sign Up</button>
          </div>
          <div id="account-menu-wrap" class="account-menu-wrap" hidden>
            <button id="account-btn" class="account-btn" type="button" aria-haspopup="true" aria-expanded="false">
              <span id="account-initial" class="account-initial" aria-hidden="true"></span>
              <span id="account-name" class="account-name"></span>
              <span aria-hidden="true">▾</span>
            </button>
            <div id="account-dropdown" class="account-dropdown" hidden>
              <button id="menu-settings-btn" type="button">Account Settings</button>
              <button id="menu-library-btn" type="button">Saved Experiences</button>
              <button id="menu-signout-btn" type="button">Sign Out</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ============================================================
       LANDING — a simple welcome and two choices
       ============================================================ -->
  <main class="landing-main">
    <section class="landing-hero">
      <p class="hero-eyebrow">Immersive Experience Design</p>
      <h1 class="landing-question">Hi! Would you like to start designing or learn IXD?</h1>
      <p class="landing-sub">Pick where you'd like to go.</p>
      <div class="landing-choices">
        <a class="btn btn-primary btn-large" href="design.html">Start Designing</a>
        <a class="btn btn-brand btn-large" href="about.html">Learn More</a>
      </div>
    </section>
  </main>

  <!-- ============================================================
       FOOTER
       ============================================================ -->
  <footer class="site-footer">
    <p class="footer-brand">Ruscella Obeid</p>
    <p id="footer-copyright"></p>
  </footer>

  <!-- ============================================================
       SHARED DIALOGS (authentication + account settings)
       ============================================================ -->
  <dialog id="auth-modal" class="modal" aria-labelledby="auth-title">
    <div class="modal-head">
      <h2 id="auth-title">Sign In</h2>
      <button id="auth-close" class="modal-close" type="button" aria-label="Close">✕</button>
    </div>
    <label class="field" id="auth-name-field" hidden>
      <span>Display name</span>
      <input id="auth-name" type="text" autocomplete="name" />
    </label>
    <label class="field">
      <span>Email</span>
      <input id="auth-email" type="email" autocomplete="username" />
    </label>
    <label class="field" id="auth-password-field">
      <span>Password</span>
      <input id="auth-password" type="password" autocomplete="current-password" />
    </label>
    <label class="field" id="auth-confirm-field" hidden>
      <span>Confirm password</span>
      <input id="auth-confirm" type="password" autocomplete="new-password" />
    </label>
    <p id="auth-error" class="login-error" hidden></p>
    <p id="auth-info" class="auth-info" hidden></p>
    <div class="modal-actions">
      <button id="auth-submit" class="btn btn-primary" type="button">Sign In</button>
      <button id="auth-cancel" class="btn" type="button">Cancel</button>
    </div>
    <p class="auth-links">
      <button id="auth-to-signup" class="link-btn" type="button">Create an account</button>
      <button id="auth-to-signin" class="link-btn" type="button" hidden>Have an account? Sign in</button>
      <button id="auth-to-reset" class="link-btn" type="button">Forgot password?</button>
    </p>
  </dialog>

  <dialog id="account-settings-modal" class="modal" aria-labelledby="account-settings-title">
    <div class="modal-head">
      <h2 id="account-settings-title">Account Settings</h2>
      <button id="settings-close" class="modal-close" type="button" aria-label="Close">✕</button>
    </div>

    <h3 class="settings-section-title">Profile</h3>
    <label class="field">
      <span>Email</span>
      <input id="settings-email" type="email" autocomplete="username" readonly />
    </label>
    <label class="field">
      <span>Display name</span>
      <input id="settings-name" type="text" autocomplete="name" />
    </label>
    <div class="modal-actions">
      <button id="settings-name-save" class="btn btn-primary" type="button">Save Display Name</button>
    </div>
    <p id="settings-name-status" class="sync-status settings-status" role="status" hidden></p>

    <h3 class="settings-section-title">Security</h3>
    <label class="field">
      <span>Current password</span>
      <input id="settings-current-pw" type="password" autocomplete="current-password" />
    </label>
    <label class="field">
      <span>New password</span>
      <input id="settings-new-pw" type="password" autocomplete="new-password" />
    </label>
    <label class="field">
      <span>Confirm new password</span>
      <input id="settings-confirm-pw" type="password" autocomplete="new-password" />
    </label>
    <div class="modal-actions">
      <button id="settings-pw-change" class="btn btn-primary" type="button">Change Password</button>
      <button id="settings-pw-reset" class="btn" type="button">Send Password Reset Email</button>
    </div>
    <p id="settings-pw-status" class="sync-status settings-status" role="status" hidden></p>
  </dialog>

  <!-- Landing and About load only the shared account module, never
       the taxonomy editor or generator. -->
  <script type="module" src="account.js?v=20260720"></script>
</body>
</html>
